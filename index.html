---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    .slide-image {
      max-height: 250px;
      max-width: 100%;
      border: 2px solid var(--neon-green);
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
    }
    .audio-control {
      background: transparent;
      border: 1px solid var(--neon-green);
      color: var(--neon-green);
      padding: 5px 10px;
      font-family: monospace;
      cursor: pointer;
      text-shadow: 0 0 5px var(--neon-green);
    }
    .audio-control:hover {
      background: var(--neon-green);
      color: var(--crt-bg);
    }
  </style>
</head>
<body>

  <div class="crt-overlay"></div>

  <!-- Ambient continuous background loop -->
  <audio id="bg-audio" loop src="{{ '/assets/audio/maorimusic.mp3' | relative_url }}"></audio>
  
  <!-- Dedicated player for slide-specific sound bites -->
  <audio id="slide-audio"></audio>

  <div class="dashboard">
    <header>
      <div style="font-size: 1.8rem; font-weight: bold; letter-spacing: 3px;">KIWI.AS</div>
      <div>
        <button class="audio-control" id="audio-toggle" onclick="toggleAudio()">🔊 AUDIO: OFF</button>
      </div>
      <div class="live-indicator">● BROADCASTING LIVE</div>
    </header>

    <main class="main-screen" id="display-wall">
      <!-- Content injected by JavaScript goes here -->
    </main>

    <footer>
      <div>SYS_STATUS: GOOD AS GOLD</div>
      <div id="countdown">LOADING CHANNEL...</div>
      <div>© 2026 OUT THE GATE ENTERTAINMENT</div>
    </footer>
  </div>

  <script>
    // Build the data structure including image and custom sound attributes
    const dataWall = [
      {% for item in site.data.kiwiana %}
      {
        type: "{{ item.type }}",
        title: "{{ item.title }}",
        content: "{{ item.content }}",
        tag: "{{ item.tag }}",
        image: "{{ item.image }}",
        sound: "{{ item.sound }}",
        duration: {{ item.duration | default: 15 }}
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];

    const displayWall = document.getElementById('display-wall');
    const countdownEl = document.getElementById('countdown');
    const crtOverlay = document.querySelector('.crt-overlay');
    const bgAudio = document.getElementById('bg-audio');
    const slideAudio = document.getElementById('slide-audio');
    const audioToggleBtn = document.getElementById('audio-toggle');
    
    const standardCycleTime = 15; 
    let currentCountdown = standardCycleTime;
    let timerInterval;
    let isMuted = true;

    function toggleAudio() {
      if (isMuted) {
        isMuted = false;
        audioToggleBtn.innerText = "🔊 AUDIO: ON";
        
        // Drop the master background volume down to 50%
        bgAudio.volume = 0.2;
        slideAudio.volume = 0.2;
        
        // Kick off general background audio if we're not currently running a video or unique sound
        if (!crtOverlay.classList.contains('no-overlay') && slideAudio.paused) {
          bgAudio.play().catch(() => {});
        }
      } else {
        isMuted = true;
        audioToggleBtn.innerText = "🔇 AUDIO: OFF";
        bgAudio.pause();
        slideAudio.pause();
      }
    }

    function renderNextItem() {
      clearInterval(timerInterval);

      // Stop any specific slide audio instantly from the previous channel selection
      slideAudio.pause();
      slideAudio.src = ""; 

      const item = dataWall[Math.floor(Math.random() * dataWall.length)];
      currentCountdown = item.duration ? parseInt(item.duration) : standardCycleTime;

      displayWall.style.opacity = 0;

      setTimeout(() => {
        if (item.type === 'video') {
          // If video, drop both ambient loops and slide specific sounds out completely
          bgAudio.pause();
          crtOverlay.classList.add('no-overlay');

          displayWall.innerHTML = `
            <span class="content-tag">${item.tag}</span>
            <h1 class="content-title">${item.title}</h1>
            <div class="video-container">
              <iframe src="${item.content}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
          `;
        } else {
          crtOverlay.classList.remove('no-overlay');

          // Audio Routing Logic:
          if (!isMuted) {
            if (item.sound) {
              // If this item has its own unique sound effect, pause the background track and play this instead
              bgAudio.pause();
              slideAudio.src = item.sound;
              slideAudio.play().catch(() => {});
            } else {
              // If it doesn't have an individual track, resume our master background soundtrack
              bgAudio.play().catch(() => {});
            }
          }

          let imgHtml = item.image ? `<img src="${item.image}" class="slide-image" alt="Kiwiana content">` : '';

          displayWall.innerHTML = `
            <span class="content-tag">${item.tag}</span>
            <h1 class="content-title">${item.title}</h1>
            ${imgHtml}
            <p class="content-body">"${item.content}"</p>
          `;
        }
        displayWall.style.opacity = 1;
        startTimer();
      }, 400);
    }

    function startTimer() {
      clearInterval(timerInterval);
      countdownEl.innerText = `NEXT CHANNEL IN: ${currentCountdown}s`;

      timerInterval = setInterval(() => {
        currentCountdown--;
        countdownEl.innerText = `NEXT CHANNEL IN: ${currentCountdown}s`;
        
        if (currentCountdown <= 0) {
          renderNextItem();
        }
      }, 1000);
    }

    renderNextItem();
  </script>
</body>
</html>
