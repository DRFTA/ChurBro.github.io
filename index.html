---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    .slide-image {
      max-height: 250px;
      max-width: 100%;
      border: 2px solid var(--neon-green);
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
    }
    .audio-control {
      background: transparent;
      border: 1px solid var(--neon-green);
      color: var(--neon-green);
      padding: 5px 10px;
      font-family: monospace;
      cursor: pointer;
      text-shadow: 0 0 5px var(--neon-green);
      font-size: 0.9rem;
    }
    .audio-control:hover {
      background: var(--neon-green);
      color: var(--crt-bg);
    }
    
    /* Side Navigation Buttons Styling */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10, 15, 13, 0.6);
      border: 2px solid var(--neon-green);
      color: var(--neon-green);
      font-family: monospace;
      font-size: 1.5rem;
      padding: 15px 10px;
      cursor: pointer;
      z-index: 20;
      text-shadow: 0 0 5px var(--neon-green);
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
      transition: all 0.2s ease;
      user-select: none;
    }
    .nav-btn:hover {
      background: var(--neon-green);
      color: var(--crt-bg);
      box-shadow: 0 0 15px var(--neon-green);
    }
    #prev-btn { left: 10px; border-radius: 0 5px 5px 0; }
    #next-btn { right: 10px; border-radius: 5px 0 0 5px; }

    /* Hide buttons slightly on tiny screens if they overlap text */
    @media (max-width: 480px) {
      .nav-btn {
        padding: 10px 5px;
        font-size: 1.1rem;
        background: rgba(10, 15, 13, 0.85);
      }
    }
  </style>
</head>
<body>

  <div class="crt-overlay"></div>

  <button id="prev-btn" class="nav-btn" onclick="goBack(event)">◀</button>
  <button id="next-btn" class="nav-btn" onclick="goForward(event)">▶</button>

  <audio id="bg-audio" loop src="{{ '/assets/audio/maorimusic.mp3' | relative_url }}"></audio>
  
  <audio id="slide-audio"></audio>

  <div class="dashboard">
    <header>
      <div style="font-size: 1.8rem; font-weight: bold; letter-spacing: 3px;">CHUR.BRO</div>
      <div>
        <button class="audio-control" id="audio-toggle" onclick="toggleAudio()">🔊 AUDIO: ON</button>
      </div>
      <div class="live-indicator">● BROADCASTING LIVE</div>
    </header>

    <main class="main-screen" id="display-wall">
      </main>

    <footer>
      <div>SYS_STATUS: SWEET AZ BRO!</div>
      <div id="countdown">LOADING CHANNEL...</div>
      <div>© 2026 OUT THE GATE ENTERTAINMENT</div>
    </footer>
  </div>

  <script>
    const dataWall = [
      {% for item in site.data.kiwiana %}
      {
        type: "{{ item.type }}",
        title: "{{ item.title }}",
        content: "{{ item.content }}",
        tag: "{{ item.tag }}",
        image: "{% if item.image contains 'http' %}{{ item.image }}{% else %}{{ item.image | relative_url }}{% endif %}",
        sound: "{{ item.sound }}",
        duration: {{ item.duration | default: 11 }}
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];

    const displayWall = document.getElementById('display-wall');
    const countdownEl = document.getElementById('countdown');
    const crtOverlay = document.querySelector('.crt-overlay');
    const bgAudio = document.getElementById('bg-audio');
    const slideAudio = document.getElementById('slide-audio');
    const audioToggleBtn = document.getElementById('audio-toggle');
    
    const standardCycleTime = 11; 
    let currentCountdown = standardCycleTime;
    let timerInterval;
    let isMuted = false;

    // 🃏 THE SHUFFLE ENGINE VARIABLES
    let shuffledDeck = [];
    let historyStack = [];
    let historyIndex = -1;

    bgAudio.volume = 0.1;
    slideAudio.volume = 0.1;

    // Knuth-Fisher-Yates Shuffle Algorithm to perfectly randomize our deck
    function shuffleNewDeck() {
      // Clone the original data array so we don't mess it up
      let deck = [...dataWall];
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      return deck;
    }

    window.addEventListener('click', () => {
      if (!isMuted && bgAudio.paused && slideAudio.paused && !crtOverlay.classList.contains('no-overlay')) {
        bgAudio.play().catch(() => {});
      }
    }, { once: true });

    function toggleAudio() {
      event.stopPropagation(); 
      if (isMuted) {
        isMuted = false;
        audioToggleBtn.innerText = "🔊 AUDIO: ON";
        if (!crtOverlay.classList.contains('no-overlay') && slideAudio.paused) {
          bgAudio.play().catch(() => {});
        }
      } else {
        isMuted = true;
        audioToggleBtn.innerText = "🔇 AUDIO: OFF";
        bgAudio.pause();
        slideAudio.pause();
      }
    }

    function renderItem(item) {
      clearInterval(timerInterval);
      slideAudio.pause();
      slideAudio.src = ""; 

      currentCountdown = item.duration ? parseInt(item.duration) : standardCycleTime;
      displayWall.style.opacity = 0;

      setTimeout(() => {
        // Check if this slide has a video OR contains an image path
        if (item.type === 'video' || item.image) {
          // Kill the dark scanline overlay so media is crystal clear
          crtOverlay.classList.add('no-overlay');
        } else {
          // Bring back the retro CRT look for text-only slang/facts
          crtOverlay.classList.remove('no-overlay');
        }

        // Handle Audio playback rules based on types
        if (item.type === 'video') {
          bgAudio.pause();
        } else if (!isMuted) {
          if (item.sound) {
            bgAudio.pause();
            slideAudio.src = item.sound;
            slideAudio.volume = 0.1;
            slideAudio.play().catch(() => {});
          } else {
            bgAudio.volume = 0.1;
            bgAudio.play().catch(() => {});
          }
        }

        // Generate the matching HTML structure
        if (item.type === 'video') {
          displayWall.innerHTML = `
            <span class="content-tag">${item.tag}</span>
            <h1 class="content-title">${item.title}</h1>
            <div class="video-container">
              <iframe src="${item.content}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
          `;
        } else {
          let imgHtml = item.image ? `<img src="${item.image}" class="slide-image" alt="Kiwiana content">` : '';

          displayWall.innerHTML = `
            <span class="content-tag">${item.tag}</span>
            <h1 class="content-title">${item.title}</h1>
            ${imgHtml}
            <p class="content-body">"${item.content}"</p>
          `;
        }

        displayWall.style.opacity = 1;
        startTimer();
      }, 400);
    }

    function renderNextItem() {
      // 1. If we pressed 'Back' earlier, move forward through the history log first
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        renderItem(historyStack[historyIndex]);
        return;
      }

      // 2. If our shuffled deck is empty (or it's the first run), generate a fresh shuffled deck
      if (shuffledDeck.length === 0) {
        shuffledDeck = shuffleNewDeck();
      }

      // 3. Pull the next unique card off the top of our shuffled deck
      const nextItem = shuffledDeck.pop();
      
      // 4. Save it into our permanent sequential history tracking loop
      historyStack.push(nextItem);
      historyIndex++;
      
      renderItem(nextItem);
    }

    function goForward(event) {
      if(event) event.stopPropagation();
      renderNextItem();
    }

    function goBack(event) {
      if(event) event.stopPropagation();
      if (historyIndex > 0) {
        historyIndex--;
        renderItem(historyStack[historyIndex]);
      }
    }

    function startTimer() {
      clearInterval(timerInterval);
      countdownEl.innerText = `NEXT CHANNEL IN: ${currentCountdown}s`;

      timerInterval = setInterval(() => {
        currentCountdown--;
        countdownEl.innerText = `NEXT CHANNEL IN: ${currentCountdown}s`;
        
        if (currentCountdown <= 0) {
          renderNextItem();
        }
      }, 1000);
    }

    // Initialize the pool and fire up the first slide
    shuffledDeck = shuffleNewDeck();
    renderNextItem();
  </script>
</body>
</html>
