---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    .slide-image {
      max-height: 250px;
      max-width: 100%;
      border: 2px solid var(--neon-green);
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
    }
    .audio-control, .add-btn {
      background: transparent;
      border: 1px solid var(--neon-green);
      color: var(--neon-green);
      padding: 5px 10px;
      font-family: monospace;
      cursor: pointer;
      text-shadow: 0 0 5px var(--neon-green);
      font-size: 0.9rem;
    }
    .audio-control:hover, .add-btn:hover {
      background: var(--neon-green);
      color: var(--crt-bg);
    }
    
    /* Side Navigation Buttons Styling */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10, 15, 13, 0.6);
      border: 2px solid var(--neon-green);
      color: var(--neon-green);
      font-family: monospace;
      font-size: 1.5rem;
      padding: 15px 10px;
      cursor: pointer;
      z-index: 20;
      text-shadow: 0 0 5px var(--neon-green);
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
      transition: all 0.2s ease;
      user-select: none;
    }
    .nav-btn:hover {
      background: var(--neon-green);
      color: var(--crt-bg);
      box-shadow: 0 0 15px var(--neon-green);
    }
    #prev-btn { left: 10px; border-radius: 0 5px 5px 0; }
    #next-btn { right: 10px; border-radius: 5px 0 0 5px; }

    /* 📌 Submission Modal Pop-up Box */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: var(--crt-bg);
      border: 2px solid var(--neon-green);
      padding: 25px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 20px var(--neon-green);
      font-family: monospace;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--neon-green);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .close-btn {
      background: transparent;
      border: none;
      color: red;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      margin-bottom: 5px;
      color: var(--ui-amber);
    }
    .form-group input, .form-group select, .form-group textarea {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--neon-green);
      color: var(--neon-green);
      padding: 8px;
      font-family: monospace;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      box-shadow: 0 0 5px var(--neon-green);
    }
    .submit-form-btn {
      background: var(--neon-green);
      color: var(--crt-bg);
      border: none;
      padding: 10px 15px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .submit-form-btn:hover {
      box-shadow: 0 0 10px var(--neon-green);
    }

    @media (max-width: 480px) {
      .nav-btn { padding: 10px 5px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <div class="crt-overlay"></div>

  <!-- Navigation Buttons -->
  <button id="prev-btn" class="nav-btn" onclick="goBack(event)">◀</button>
  <button id="next-btn" class="nav-btn" onclick="goForward(event)">▶</button>

  <!-- Ambient audio tracks -->
  <audio id="bg-audio" loop src="{{ '/assets/audio/maori-music.mp3' | relative_url }}"></audio>
  <audio id="slide-audio"></audio>

  <!-- 🎛️ Submission Modal Structure -->
  <div class="modal-overlay" id="submission-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 style="margin:0; color: var(--neon-green);">📢 SUBMIT KIWIANA DATA</h3>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <!-- Change the action attribute link to point to your Google Form/Tally handler when ready -->
      <form id="kiwi-submission-form" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
          <label>Channel Type</label>
          <select id="form-type" required>
            <option value="slang">Slang / Lingo</option>
            <option value="fact">Historical Fact</option>
            <option value="meme">Classic Meme</option>
            <option value="rural">Rural NZ</option>
            <option value="bogan">Bogan Culture</option>
          </select>
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="form-title" placeholder="e.g., Always Blow on the Pie" required>
        </div>
        <div class="form-group">
          <label>Broadcast Content / Text Description</label>
          <textarea id="form-content" rows="3" placeholder="Write out the quote, rule, or details here..." required></textarea>
        </div>
        <div class="form-group">
          <label>Category Tag</label>
          <input type="text" id="form-tag" placeholder="e.g., Tactical Advice" required>
        </div>
        <div class="form-group">
          <label>Image Link (Optional)</label>
          <input type="text" id="form-image" placeholder="/assets/images/your-pic.jpg">
        </div>
        <button type="submit" class="submit-form-btn">BROADCAST SUBMISSION</button>
      </form>
    </div>
  </div>

  <div class="dashboard">
    <header>
      <div style="font-size: 1.8rem; font-weight: bold; letter-spacing: 3px;">CHUR.BRO</div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <a href="https://tally.so/r/Pd4N0d" target="_blank" class="add-btn" style="text-decoration: none; display: inline-block;">➕ ADD CONTENT</a>
        <button class="audio-control" id="audio-toggle" onclick="toggleAudio()">🔊 AUDIO: ON</button>
      </div>
      <div class="live-indicator">● BROADCASTING LIVE</div>
    </header>

    <main class="main-screen" id="display-wall">
      <!-- Content injected by JavaScript -->
    </main>

    <footer>
      <div>SYS_STATUS: She'll be right</div>
      <div id="countdown">LOADING CHANNEL...</div>
      <div>© 2026 OUT THE GATE ENTERTAINMENT</div>
    </footer>
  </div>

  <script>
    const dataWall = [
      {% for item in site.data.kiwiana %}
      {
        type: "{{ item.type }}",
        title: "{{ item.title }}",
        content: "{{ item.content }}",
        tag: "{{ item.tag }}",
        image: "{% if item.image contains 'http' %}{{ item.image }}{% else %}{{ item.image | relative_url }}{% endif %}",
        sound: "{{ item.sound }}",
        duration: {{ item.duration | default: 11 }}
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];

    const displayWall = document.getElementById('display-wall');
    const countdownEl = document.getElementById('countdown');
    const crtOverlay = document.querySelector('.crt-overlay');
    const bgAudio = document.getElementById('bg-audio');
    const slideAudio = document.getElementById('slide-audio');
    const audioToggleBtn = document.getElementById('audio-toggle');
    const submissionModal = document.getElementById('submission-modal');
    
    const standardCycleTime = 11; 
    let currentCountdown = standardCycleTime;
    let timerInterval;
    let isMuted = false;

    let shuffledDeck = [];
    let historyStack = [];
    let historyIndex = -1;

    bgAudio.volume = 0.1;
    slideAudio.volume = 0.1;

    function shuffleNewDeck() {
      let deck = [...dataWall];
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      return deck;
    }

    window.addEventListener('click', () => {
      if (!isMuted && bgAudio.paused && slideAudio.paused && !crtOverlay.classList.contains('no-overlay')) {
        bgAudio.play().catch(() => {});
      }
    }, { once: true });

    function toggleAudio() {
      event.stopPropagation(); 
      if (isMuted) {
        isMuted = false;
        audioToggleBtn.innerText = "🔊 AUDIO: ON";
        if (!crtOverlay.classList.contains('no-overlay') && slideAudio.paused) {
          bgAudio.play().catch(() => {});
        }
      } else {
        isMuted = true;
        audioToggleBtn.innerText = "🔇 AUDIO: OFF";
        bgAudio.pause();
        slideAudio.pause();
      }
    }

    // Modal Control Functions
    function openModal() {
      submissionModal.classList.add('open');
    }
    function closeModal() {
      submissionModal.classList.remove('open');
    }
    function handleFormSubmit(e) {
      e.preventDefault();
      
      // 1. Grab values entered into the form inputs
      const type = document.getElementById('form-type').value;
      const title = document.getElementById('form-title').value;
      const content = document.getElementById('form-content').value;
      const tag = document.getElementById('form-tag').value;
      const image = document.getElementById('form-image').value;

      // ⚠️ REPLACE THESE TWO WITH YOUR ACTUAL DETAILS:
      const GITHUB_USERNAME = "DRFTA";
      const REPO_NAME = "ChurBro.github.io"; 
      
      // 🔐 paste your Classic Token string here
      const TOKEN = "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"; 

      // 2. Format the Payload payload
      const payload = {
        event_type: "add_kiwiana_item",
        client_payload: { type, title, content, tag, image }
      };

      // 3. Shoot a POST request straight to the GitHub API
      fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/dispatches`, {
        method: 'POST',
        headers: {
          'Authorization': `token ${TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      })
      .then(response => {
        if (response.status === 204) {
          alert("Sweet as! Your broadcast submission has been queued up. Give GitHub a minute to compile the fresh deck.");
          closeModal();
          document.getElementById('kiwi-submission-form').reset();
        } else {
          alert("Yeah, nah, something went pear-shaped with the server connection.");
        }
      })
      .catch(error => {
        console.error("API Error:", error);
        alert("Dropped connection to the channel grid.");
      });
    }

    function renderItem(item) {
      clearInterval(timerInterval);
      slideAudio.pause();
      slideAudio.src = ""; 

      currentCountdown = item.duration ? parseInt(item.duration) : standardCycleTime;
      displayWall.style.opacity = 0;

      setTimeout(() => {
        if (item.type === 'video' || item.image) {
          crtOverlay.classList.add('no-overlay');
        } else {
          crtOverlay.classList.remove('no-overlay');
        }

        if (item.type === 'video') {
          bgAudio.pause();
        } else if (!isMuted) {
          if (item.sound) {
            bgAudio.pause();
            slideAudio.src = item.sound;
            slideAudio.volume = 0.1;
            slideAudio.play().catch(() => {});
          } else {
            bgAudio.volume = 0.1;
            bgAudio.play().catch(() => {});
          }
        }

        if (item.type === 'video') {
          displayWall.innerHTML = `
            <span class="content-tag">${item.tag}</span>
            <h1 class="content-title">${item.title}</h1>
            <div class="video-container">
              <iframe src="${item.content}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
          `;
        } else {
          let imgHtml = item.image ? `<img src="${item.image}" class="slide-image" alt="Kiwiana content">` : '';

          displayWall.innerHTML = `
            <span class="content-tag">${item.tag}</span>
            <h1 class="content-title">${item.title}</h1>
            ${imgHtml}
            <p class="content-body">"${item.content}"</p>
          `;
        }
        displayWall.style.opacity = 1;
        startTimer();
      }, 400);
    }

    function renderNextItem() {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        renderItem(historyStack[historyIndex]);
        return;
      }
      if (shuffledDeck.length === 0) {
        shuffledDeck = shuffleNewDeck();
      }
      const nextItem = shuffledDeck.pop();
      historyStack.push(nextItem);
      historyIndex++;
      renderItem(nextItem);
    }

    function goForward(event) {
      if(event) event.stopPropagation();
      renderNextItem();
    }

    function goBack(event) {
      if(event) event.stopPropagation();
      if (historyIndex > 0) {
        historyIndex--;
        renderItem(historyStack[historyIndex]);
      }
    }

    function startTimer() {
      clearInterval(timerInterval);
      countdownEl.innerText = `NEXT CHANNEL IN: ${currentCountdown}s`;

      timerInterval = setInterval(() => {
        currentCountdown--;
        countdownEl.innerText = `NEXT CHANNEL IN: ${currentCountdown}s`;
        
        if (currentCountdown <= 0) {
          renderNextItem();
        }
      }, 1000);
    }

    shuffledDeck = shuffleNewDeck();
    renderNextItem();
  </script>
</body>
</html>
