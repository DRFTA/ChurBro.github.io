- type:""  
  title: "Cardigan Bay and the Million-Dollar Harness Win"
  content: "Born in New Zealand, Cardigan Bay was a legendary harness racehorse who achieved global fame in the 1960s. He was the first harness horse in history to win over one million US dollars in prize money, becoming a source of immense national pride and a sporting icon."
  image: "https://commons.wikimedia.org/wiki/File:Cardigan_Bay_(NZ).jpg"

- type:""  
  title: "Phar Lap: The Enormous Heart of a Champion"
  content: "Phar Lap was a world-famous racing horse born in New Zealand in 1926 who went on to dominate the international turf. Upon his death, autopsies revealed his heart weighed an extraordinary 6.2 kilograms—far larger than a typical horse heart—cementing his status as a symbol of courage and physical power."
  image: "https://commons.wikimedia.org/wiki/File:Phar_Lap.jpg"

- type:""  
  title: "Ernest Rutherford and spliting the Atom"
  content: "The "father of nuclear physics," the Nelson-born Nobel laureate was the first to split the atom in 1919, fundamentally changing modern science."
  image: "https://images.nzgeo.com/2008/11/94_rutherford2-938x1300.jpg"
