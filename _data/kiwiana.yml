- type:
  title: "The Royal Endorsement of the Wooden Buzzy Bee"
  content: "The Buzzy Bee pull-along toy is New Zealand's most famous piece of domestic design, created in the mid-1940s by brothers Hector and John Ramsay. Equipped with rotating wings that emit a loud clicking noise, it became a global media sensation in April 1983 when the infant Prince William played with one on the lawn of Government House in Auckland, cementing its position in international pop culture."
  image: "https://commons.wikimedia.org/wiki/File:Toy,_pull-along_(AM_1999.104.24-6).jpg"

- type:  
  title: "The Culinary Diplomacy of the Pavlova"
  content: "Created as a tribute to Russian ballerina Anna Pavlova during her 1926 tour of New Zealand, this meringue dessert topped with whipped cream and kiwifruit has sparked a long-standing trans-Tasman ownership dispute. Historical records show its first printed recipe appeared in a New Zealand cookbook in the early 1930s, supporting its status as a native culinary icon."
  image: "https://commons.wikimedia.org/wiki/File:Pavlova_dessert.JPG"

- type:  
  title: "The Iridescent Eyes of Māori Pāua Shell Carving"
  content: "Pāua is a unique species of edible abalone encased in a highly durable, brilliant blue-green shell. Traditionally used by Māori artisans to represent the flashing eyes of ancestral figures in wooden meeting house carvings, polished pāua shell was adapted in the twentieth century into jewelry, souvenirs, and domestic ashtrays."
  image: "https://commons.wikimedia.org/wiki/File:Poupou_by_Rangi_Hetet_(detail).JPG"

- type:  
  title: "The Improvisational Engineering of Number 8 Wire"
  content: "Originally imported as a standard gauge of galvanized steel wire for agricultural fencing, Number 8 wire became a symbol of Kiwi resourcefulness. Because geographic isolation made replacement parts difficult to obtain, farmers used the wire to repair machinery, build tools, and solve household problems, establishing it as a synonym for creative engineering."
  image: "https://commons.wikimedia.org/wiki/File:Barbed_wire_B%26W.JPG"

- type:  
  title: "James Wattie and the Preservation of the Harvest"
  content: "During the Great Depression of the 1930s, Hastings businessman James Wattie realized that the vast surplus of local Hawke's Bay tomatoes was rotting in fields. In 1934, he established a local cannery, producing canned fruits, vegetables, and the highly celebrated Wattie’s Tomato Sauce, which remains a staple in households across the nation."
  image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRiWWHMzRGG7zNGFS0YAxpYMeaJ9GCDVArwYi5BGFJIx1qLJUd_pg7171df&s=10"
  
