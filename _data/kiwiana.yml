- type:  
  title: "The Marshmallow Incentive of the Chocolate Fish"
  content: "The Chocolate Fish is a popular sweet treat featuring a pink or white marshmallow fish covered in a thin layer of milk chocolate. In domestic culture, it is traditionally given as a reward or a small thank-you for a job well done, giving rise to the popular phrase, 'Give that person a chocolate fish!'"
  image: "https://commons.wikimedia.org/wiki/File:Twochocolatefish.JPG"

- type:  
  title: "Footrot Flats: Murray Ball’s Rural Satire"
  content: "Created by cartoonist Murray Ball, the cartoon strip Footrot Flats offered a highly humorous look at rural farming life. The protagonist, 'Dog', along with his owner Wal Footrot, grappled with daily agricultural mishaps in the backcountry, shaping how New Zealanders viewed their rural heritage."
  image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRW2jPYQv7Urj-nmD5n9lXOk9gIIrEeh442dDNf06_D2w&s=10"

- type:  
  title: "Barry Crump and the Literary Good Keen Man"
  content: "Author Barry Crump brought the phrase 'Good Keen Man' to the forefront of national culture through his rugged, humorous novels about hunting in the native bush. Crump’s stories celebrated the self-sufficient, laconic, and practical bushman archetype, contributing to the mythology of the outdoor Kiwi."
  image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQH9e6YmbWooJDMcfWUTauo4m160IR7n1hZ1MEze2xnfw&s=10"

- type:  
  title: "Billy T. James: Subverting the Black Singlet"
  content: "Billy T. James was a highly influential comedian who wore a black singlet and a yellow towel draped around his neck. With a characteristic chuckle, James used sharp satire to explore relationships between Māori and Pākehā, dismantling sacred cows and bringing bicultural humor to mainstream media."
  image: "https://media.rnztools.nz/rnz/image/upload/s--GtZnv-kN--/t_tohu-badge-twitter/v1643799183/4MC22VY_image_crop_120734?_a=BACCd2AD"

- type:  
  title: "Aunt Daisy’s Domestic Culinary Radio Wave"
  content: "Maud Basham, known professionally as Aunt Daisy, ruled the national radio airwaves from the 1930s to the 1950s. Her daily morning broadcasts of household hints, thrifty recipes, and general advice provided an essential domestic guide for generations of home cooks."
  image: "https://commons.wikimedia.org/wiki/File:Aunt_Daisy.JPG"
  
