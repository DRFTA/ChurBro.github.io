- type:""  
  title: "Godfrey Bowen and the King Country Shearer Monument"
  content: "Te Kuiti is home to a giant statue of a sheep shearer depicting Godfrey Bowen, who co-developed 'the Bowen technique' in the 1940s and 50s. This method revolutionized wool harvesting, allowing shearers to remove a fleece quickly and cleanly without harming the sheep, boosting agricultural exports."
  image: "https://commons.wikimedia.org/wiki/File:7451_Sheep_shearing.jpg"

- type:""  
  title: "The Long-Lasting Formula of the ANZAC Biscuit"
  content: "Popularized during World War I, ANZAC biscuits are made of rolled oats, flour, sugar, butter, golden syrup, and baking soda. Because they were baked without eggs, they did not spoil easily, allowing families to send them to soldiers serving overseas on long sea voyages."
  image: "https://commons.wikimedia.org/wiki/File:ANZAC_biscuits_(14_April_2006).jpg"

- type:""  
  title: "Lolly Cake: The Coconut-Rolled No-Bake Sweet"
  content: "Lolly cake is a popular home-style dessert made from crushed malt biscuits, melted butter, sweetened condensed milk, and chopped candy logs rolled in desiccated coconut. The mixture is shaped into a log, chilled, and sliced, serving as a staple sweet treat at children's birthdays and local bakeries."
  image: "https://commons.wikimedia.org/wiki/File:Lolly_cake_(2792116118).jpg"

- type:""  
  title: "The Herbal Licorice Extract of Black Knight"
  content: "Black Knight is a highly popular brand of black licorice manufactured in New Zealand and is famous for its soft texture and intense flavor. It is a traditional sweet treat that highlights the country's preference for classic candy profiles."
  image: "https://thelicoriceshop.com.au/cdn/shop/files/IMG-1657_1024x1024.jpg"

- type:""  
  title: "Tangy Fruits and the Cinema Floor Tradition"
  content: "Tangy Fruits were small, round, fruit-flavored candies that were historically sold in movie theaters across New Zealand. A common movie-going tradition involved children rolling the hard candies down the wooden sloped aisles of theaters during film screenings, creating a distinctive rattling sound."
  image: "https://www.nzherald.co.nz/resizer/v2/2P5GXTVIKVA33CMMSKBQ6JVAME.png?auth=32fca2dbfb6495ca8340a651a1c7f28c3e98e2a943092d12eb3e48796b4ca2c5&width=1440&height=900&quality=70&smart=true"
  
