- type:""  
  title: "The Silvery Undersides of the Native Ponga Fern"
  content: "The endemic silver fern, or ponga (Cyathea dealbata), features a dark green top leaf and a brilliant silver underside. Before European colonization, Māori travelers laid cut silver fern leaves upside down along forest paths, using the reflective silver surface to catch moonlight and navigate the bush after dark."
  image: "https://commons.wikimedia.org/wiki/File:Alsophila_tricolor_kz03.jpg"
 
- type:"" 
  title: "The Enormous Relative Volume of the Kiwi Egg"
  content: "Relative to its body size, the female kiwi bird lays a larger egg than almost any other avian species. While a human baby constitutes roughly $5\%$ of a mother's body weight, a fully formed kiwi egg occupies up to $20\%$ of the female's internal body cavity before laying, demanding a massive metabolic effort."
  image: "https://commons.wikimedia.org/wiki/File:Kiwi_hg.jpg"

- type:""  
  title: "The Smart and Rubber-Chewing Kea Alpine Parrot"
  content: "The kea (Nestor notabilis) is the world’s only true alpine parrot and is famous for its intelligence and curiosity. Often congregating in high-altitude car parks near ski resorts, these parrots frequently damage cars by using their sharp, curved beaks to chew through rubber window seals and windshield wipers."
  image: "https://commons.wikimedia.org/wiki/File:Kea._New_Zealand_Alpine_parrot._(51793149453).jpg"

- type:""  
  title: "The Dual Vocal Cords of the Mimetic Tūī Bird"
  content: "The native tūī bird (Prosthemadera novaeseelandiae) is recognizable for its metallic blue-green plumage and a distinctive white tuft of feathers under its throat. It possesses dual vocal cords that allow it to produce highly complex songs, mimic human speech, and copy environmental sounds with extraordinary accuracy."
  image: "https://commons.wikimedia.org/wiki/File:Tui_(Prosthemadera_novaeseelandiae)_Tiritiri_Matangi.jpg"

- type:""  
  title: "Hoiho: The Rare Yellow-Eyed Forest Penguin"
  content: "Known in Māori as the hoiho (meaning 'noise shouter' due to its shrill call), the yellow-eyed penguin is one of the rarest penguin species in the world. Nesting in coastal forests and scrub along the South Island, it is highly sensitive to habitat degradation and mammalian predators."
  image: "https://commons.wikimedia.org/wiki/File:Yellow-eyed_Penguin_(Megadyptes_antipodes).jpg"
  
