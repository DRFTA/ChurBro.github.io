- type:  
  title: "The Whimsical World of the Hobbiton Movie Set"
  content: "The transformation of a sheep farm in Matamata into the permanent Hobbiton movie set for Peter Jackson’s cinematic adaptations of J.R.R. Tolkien’s works represents a major milestone in modern tourism and identity. The circular green hobbit holes have become modern symbols of New Zealand's landscapes and cinematic craft."
  image: "https://commons.wikimedia.org/wiki/File:2022-06-10_Hobbiton_-_The_Shire_location_5.jpg"

- type:  
  title: "Nelson’s Blue Lake: The Clearest Natural Water"
  content: "Nelson’s Blue Lake, known as Rotomairewhenua in Māori, holds the official title of the clearest natural body of water in the world. Scientific tests show that its water clarity is comparable to distilled water, with visibility extending up to 80 meters, serving as a sacred icon of natural heritage."
  image: "https://commons.wikimedia.org/wiki/File:Rotomairewhenua.jpg"

- type:  
  title: "Kate Sheppard and the Electoral Milestone of 1893"
  content: "In September 1893, New Zealand became the first self-governing nation in the world to grant women the right to vote in parliamentary elections. Led by Kate Sheppard, the historic achievement is a cornerstone of the nation’s egalitarian social history, preceding other Western democracies by decades."
  image: "https://commons.wikimedia.org/wiki/File:Mrs._K._W._Sheppard_(cropped).jpg"

- type:  
  title: "The Steep Concrete Ascent of Baldwin Street"
  content: "Located in the southern city of Dunedin, Baldwin Street is officially recognized as the steepest residential street in the world, featuring a maximum grade of approximately $34.8\%$. The street is constructed using concrete rather than asphalt to prevent the road surface from melting and sliding down the slope during hot summers."
  image: "https://commons.wikimedia.org/wiki/File:House_at_Baldwin_Street.JPG"

- type:  
  title: "The Historic Timber and Brews of the Moutere Inn"
  content: "Established near Nelson in 1850, the Moutere Inn holds the prestigious title of New Zealand's oldest pub still operating in its original building. It serves as a historical monument to the early days of European settlement and the social role of public houses in community formation."
  image: "https://commons.wikimedia.org/wiki/File:Moutere_Inn_MRD.jpg"
  
