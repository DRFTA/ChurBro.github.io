name: Handle Tally Form Submission

on:
  repository_dispatch:
    types: [add_kiwiana_item] # Matches the event_type we set up in Make

jobs:
  process_form:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so rebasing works perfectly

      - name: Append Form Data to YAML File
        run: |
          # Create the _data directory if it doesn't exist yet
          mkdir -p _data
          
          # Write the incoming payload straight into your data file with strict YAML spacing
          echo "" >> _data/kiwiana.yml
          echo "- type: \"${{ github.event.client_payload.type }}\"" >> _data/kiwiana.yml
          echo "  title: \"${{ github.event.client_payload.title }}\"" >> _data/kiwiana.yml
          echo "  content: \"${{ github.event.client_payload.content }}\"" >> _data/kiwiana.yml
          echo "  tag: \"${{ github.event.client_payload.tag }}\"" >> _data/kiwiana.yml
          echo "  image: \"${{ github.event.client_payload.image }}\"" >> _data/kiwiana.yml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Kiwiana Broadcast Bot"
          git config --global user.email "actions@github.com"
          git add _data/kiwiana.yml
          git commit -m "chore: automated broadcast addition [${{ github.event.client_payload.title }}]" || echo "No changes to commit"
          
          # Pull down any fresh changes that happened while this ran to prevent race condition blocks
          git pull --rebase origin main
          
          git push origin main
